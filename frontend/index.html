<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <button onclick="newChat()" class="new-chat">
            + New Chat
        </button>

        <div id="chat-list" class="chat-list"></div>

    </div>

    <div class="chat-container">

        <div class="header">
            <h2>🤖 FAQ AI Assistant</h2>

            <div class="status">
                <span class="dot"></span>
                Online • Ready
            </div>

            <div class="top-buttons">
                <button onclick="clearChat()" class="clear-btn">
                    Clear
                </button>

                <button id="theme-toggle" class="theme-btn">
                    🌙 Dark Mode
                </button>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="suggestions">
            <button onclick="askSuggestion('refund policy')">Refund</button>
            <button onclick="askSuggestion('shipping')">Shipping</button>
            <button onclick="askSuggestion('support')">Support</button>
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ask something..." rows="1"></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<div id="menu-overlay"></div>

<script src="script.js"></script>

</body>
</html>
