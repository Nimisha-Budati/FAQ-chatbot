
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <h2>🤖 FAQ AI Assistant</h2>
        <button onclick="clearChat()" class="clear-btn">Clear Chat</button>
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
        <div id="chat-box"></div>
        <div class="suggestions">
            <p>💡 Try asking:</p>
            <button onclick="askSuggestion('What is your return policy?')">
                Return Policy
            </button>
            <button onclick="askSuggestion('How can I contact support?')">
                Contact Support
            </button>
            <button onclick="askSuggestion('Do you offer refunds?')">
                Refunds
            </button>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off">
            <button type="button" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
